    <!-- CENTRAL DE LIGAÇÕES -->
    <div class="page" id="page-ligacoes">
      <div class="discagem-header">
        <div>
          <div style="font-size:15px;font-weight:600;letter-spacing:-0.02em">Central de Ligações</div>
          <div style="font-size:11px;color:#94A3B8;margin-top:2px">Fila ordenada por prioridade de score</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select class="fsel" id="disc-filter-corr" onchange="renderDiscagem()"><option value="">Meus leads</option></select>
          <button class="btn-p" onclick="reiniciarSessaoDisc()" style="background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.2);color:#86EFAC;font-size:11px">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
            Nova sessão
          </button>
        </div>
      </div>

      <div class="disc-kpis">
        <div class="disc-kpi"><div class="disc-kpi-val" id="disc-k-total">0</div><div class="disc-kpi-lbl">Na fila</div></div>
        <div class="disc-kpi"><div class="disc-kpi-val" style="color:#22C55E" id="disc-k-atendeu">0</div><div class="disc-kpi-lbl">Atenderam</div></div>
        <div class="disc-kpi"><div class="disc-kpi-val" style="color:#EF4444" id="disc-k-nao">0</div><div class="disc-kpi-lbl">Não atenderam</div></div>
        <div class="disc-kpi"><div class="disc-kpi-val" style="color:#86EFAC" id="disc-k-ag">0</div><div class="disc-kpi-lbl">Agendados</div></div>
        <div class="disc-kpi"><div class="disc-kpi-val" style="color:#F59E0B" id="disc-k-taxa">0%</div><div class="disc-kpi-lbl">Taxa de contato</div></div>
      </div>

      <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:1.4;min-width:280px">
          <div id="disc-lead-ativo"></div>
          <div class="disc-hist" id="disc-historico-wrap" style="display:none">
            <div class="disc-hist-hd">Histórico desta sessão</div>
            <div id="disc-historico-lista"></div>
          </div>
        </div>
        <div style="flex:1;min-width:260px">
          <div class="disc-fila-wrap">
            <div class="disc-fila-hd">
              <span class="disc-fila-hd-txt">Fila de ligações</span>
              <span id="disc-fila-count" style="font-size:10px;color:#94A3B8">0 leads</span>
            </div>
            <div id="disc-fila-lista"></div>
          </div>
        </div>
      </div>
    </div>
