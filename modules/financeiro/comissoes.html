    <!-- COMISSÕES -->
    <div class="page" id="page-comissoes">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-size:15px;font-weight:600;letter-spacing:-0.02em">Comissões</div>
          <div style="font-size:11px;color:#94A3B8;margin-top:2px">Controle de comissões por venda fechada</div>
          <div id="com-mes-label" style="font-size:12px;color:#86EFAC;font-weight:600;margin-top:4px"></div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <button class="btn-s" onclick="irParaMesAtualComissao()" title="Ir para mês atual" style="font-size:11px;padding:4px 10px">📅 Mês atual</button>
          <select class="fsel" id="com-filter-mes" onchange="renderComissoes()">
            <option value="">Todos os meses</option>
          </select>
          <select class="fsel" id="com-filter-corr" onchange="renderComissoes()">
            <option value="">Todos corretores</option>
          </select>
          <select class="fsel" id="com-filter-status" onchange="renderComissoes()">
            <option value="">Todos status</option>
            <option value="pendente">Pendente</option>
            <option value="pago">Pago</option>
            <option value="parcial">Parcial</option>
          </select>
        </div>
      </div>
      <div class="com-resumo" id="com-resumo"></div>

      <!-- Painel de Distribuição — visível apenas para CEO/Diretor -->
      <div id="com-distribuicao-panel" style="display:none;background:#0D1410;border:1px solid rgba(168,85,247,0.18);border-radius:12px;padding:14px 16px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
          <div style="font-size:11px;font-weight:600;color:#D8B4FE;letter-spacing:0.06em;text-transform:uppercase;font-family:'DM Mono',monospace;opacity:0.85">📊 Distribuição sobre o VGV</div>
          <div style="font-size:10px;color:#64748B">% aplicados sobre o valor de venda (VGV)</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
          <div style="display:flex;flex-direction:column;gap:4px;">
            <label style="font-size:10px;color:#94A3B8;font-weight:500;letter-spacing:0.04em">🏢 IMOBILIÁRIA (%)</label>
            <input id="dist-pct-imob" type="number" min="0" max="100" step="0.01" placeholder="Ex: 5" oninput="renderComissoes()"
              style="width:110px;padding:7px 10px;background:#060A08;border:1px solid rgba(168,85,247,0.2);border-radius:8px;color:#D8B4FE;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .15s;"
              onfocus="this.style.borderColor='rgba(168,85,247,0.5)'" onblur="this.style.borderColor='rgba(168,85,247,0.2)'">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <label style="font-size:10px;color:#94A3B8;font-weight:500;letter-spacing:0.04em">👤 KEVIN (%)</label>
            <input id="dist-pct-kevin" type="number" min="0" max="100" step="0.01" placeholder="Ex: 10" oninput="renderComissoes()"
              style="width:110px;padding:7px 10px;background:#060A08;border:1px solid rgba(99,102,241,0.2);border-radius:8px;color:#A5B4FC;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .15s;"
              onfocus="this.style.borderColor='rgba(99,102,241,0.5)'" onblur="this.style.borderColor='rgba(99,102,241,0.2)'">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <label style="font-size:10px;color:#94A3B8;font-weight:500;letter-spacing:0.04em">👤 TANNER (%)</label>
            <input id="dist-pct-tanner" type="number" min="0" max="100" step="0.01" placeholder="Ex: 1" oninput="renderComissoes()"
              style="width:110px;padding:7px 10px;background:#060A08;border:1px solid rgba(245,158,11,0.2);border-radius:8px;color:#FCD34D;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .15s;"
              onfocus="this.style.borderColor='rgba(245,158,11,0.5)'" onblur="this.style.borderColor='rgba(245,158,11,0.2)'">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <label style="font-size:10px;color:#94A3B8;font-weight:500;letter-spacing:0.04em">🤝 CORRETOR (%)</label>
            <input id="dist-pct-corretor" type="number" min="0" max="100" step="0.01" placeholder="Ex: 1.2" oninput="renderComissoes()"
              style="width:110px;padding:7px 10px;background:#060A08;border:1px solid rgba(34,197,94,0.2);border-radius:8px;color:#86EFAC;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .15s;"
              onfocus="this.style.borderColor='rgba(34,197,94,0.5)'" onblur="this.style.borderColor='rgba(34,197,94,0.2)'">
          </div>
        </div>
        <div id="dist-resultados"></div>
      </div>

      <div class="com-table-wrap">
        <table class="com-table">
          <thead><tr>
            <th>Lead / Assinatura</th>
            <th id="com-th-corretor">Corretor</th>
            <th>Valor Venda</th>
            <th>%</th>
            <th>Comissão</th>
            <th id="com-th-fat" style="display:none">Faturamento</th>
            <th>Status</th>
            <th>Data</th>
          </tr></thead>
          <tbody id="com-tbody"></tbody>
        </table>
      </div>
    </div>
